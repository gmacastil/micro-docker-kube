services:
  product-db:
    container_name: product-db
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=productdb
      - POSTGRES_USER=product
      - POSTGRES_PASSWORD=product
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product -d productdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  product:
    container_name: product
    image: product:6
    depends_on:
      product-db:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      - DBHOST=product-db
      - DBPORT=5432
      - DBNAME=productdb
      - DBUSER=product
      - DBPASSWORD=product


volumes:
  postgres-data: